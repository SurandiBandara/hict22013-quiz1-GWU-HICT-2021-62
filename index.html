<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        header
        {
            width:100%;
            height:20%;
            background-color: blue;
            color:white;
           
            text-align: center;
            padding: 20px;
            margin:20px;
            border-radius: 15px;




        }

        footer
        {
            width:100% ;
            height:20%;
            background-color: grey;
            color: white;
           
            text-align: center;
            padding: 20px;
            margin: 20px;
            border-radius: 15px;



        }
        .box_1
        {
            background-color: red;
            color: white;
            padding:20px;
            margin: 20px;
            text-align: center;
            border-radius:15px;
         
            height:50%;
            display: flex;
             justify-content: center;

        }
        .box_2
        {
            background-color: green;
            color:white;
             padding:20px;
            margin: 20px;
            text-align: center;
            border-radius:15px;
            
            height:50%;
            display: flex;
             justify-content: center;
        }
        .box_3
        {
            background-color: yellow;
            color:white;
             padding:20px;
             margin: 20px;
             text-align: center;
             border-radius:15px;
            
             height:50%;
             display:flex;
             justify-content: center;
        }
        .main
        {
            flex:1;
            display: flex;
            flex-direction:row;
           gap:20px;
           justify-content: center;
        }
        
    </style>
</head>
<body>
    <header >

        <p> My Header</p>
    </header>
 
    <div class="main">
        <div class="box_1"> BOX 1</div>
        <div class="box_2">BOX 2</div>
        <div class="box_3">BOX 3</div>
    </div>

    <footer>
         <p> My Footer </p>
    </footer>
</body>
</html>
